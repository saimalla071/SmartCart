```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JSON Shopping Cart Manager</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
    line-height:1.5;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* make tables scrollable on small screens */
.cart table{
    display: block;
    width: 100%;
    overflow-x: auto;
}

@media (max-width: 600px) {
    header{
        padding:15px;
    }
    .product button, .clear{
        width:100%;
        box-sizing:border-box;
    }
    .summary{
        font-size:16px;
    }
}

.product-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.product{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.product button{
margin-top:10px;
padding:10px;
border:none;
background:#27ae60;
color:white;
cursor:pointer;
border-radius:5px;
}

.product button:hover{
background:#219150;
}

.cart{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.remove{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:5px;
}

.clear{
margin-top:10px;
background:#e74c3c;
color:white;
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:5px;
}

.summary{
margin-top:20px;
font-size:18px;
}

.discount{
color:green;
font-weight:bold;
}

.total{
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>JSON Shopping Cart Manager</h1>
</header>

<div class="container">

<h2>Products</h2>

<div class="product-list">

<div class="product">
<h3>Laptop</h3>
<p>₹55000</p>
<button onclick="addToCart('Laptop',55000)">Add to Cart</button>
</div>

<div class="product">
<h3>Smartphone</h3>
<p>₹25000</p>
<button onclick="addToCart('Smartphone',25000)">Add to Cart</button>
</div>

<div class="product">
<h3>Headphones</h3>
<p>₹3000</p>
<button onclick="addToCart('Headphones',3000)">Add to Cart</button>
</div>

<div class="product">
<h3>Smartwatch</h3>
<p>₹8000</p>
<button onclick="addToCart('Smartwatch',8000)">Add to Cart</button>
</div>

</div>


<div class="cart">

<h2>Shopping Cart</h2>

<table id="cartTable">

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Remove</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<div class="summary">

<p>Subtotal: ₹<span id="subtotal">0</span></p>

<p class="discount">Discount (5%): ₹<span id="discount">0</span></p>

<p class="total">Final Total: ₹<span id="total">0</span></p>

</div>

<button class="clear" onclick="clearCart()">Clear Cart</button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];


function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}


function addToCart(name,price){

cart.push({
name:name,
price:price
});

saveCart();
displayCart();

}


function removeItem(index){

cart.splice(index,1);

saveCart();
displayCart();

}


function clearCart(){

cart=[];
saveCart();
displayCart();

}


function displayCart(){

const tbody = document.querySelector("#cartTable tbody");

tbody.innerHTML="";

let subtotal=0;

cart.forEach((item,index)=>{

subtotal += item.price;

let row = `
<tr>
<td>${item.name}</td>
<td>₹${item.price}</td>
<td><button class="remove" onclick="removeItem(${index})">Delete</button></td>
</tr>
`;

tbody.innerHTML += row;

});

let discount=0;

if(subtotal>10000){

discount = subtotal * 0.05;

}

let total = subtotal - discount;

document.getElementById("subtotal").innerText = subtotal;

document.getElementById("discount").innerText = discount.toFixed(2);

document.getElementById("total").innerText = total.toFixed(2);

}


displayCart();

</script>

</body>
</html>
